version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: gefahrstoff_db
    restart: always
    environment:
      POSTGRES_USER: gefahrstoff_user
      POSTGRES_PASSWORD: super_secret_db_password
      POSTGRES_DB: gefahrstoff_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gefahrstoff_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - database
    environment:
      # Prisma Database Connection (PostgreSQL)
      - DATABASE_URL=postgresql://gefahrstoff_user:super_secret_db_password@database:5432/gefahrstoff_db?schema=public
      - JWT_SECRET=super_secret_jwt_key_please_change
      # Senden von Mails etc. (Anpassen falls gewünscht)
      - SMTP_HOST=
      - SMTP_PORT=
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=
    volumes:
      # Dauerhafter Speicher für hochgeladene PDFs (SDB, Zertifikate)
      - upload_data:/app/uploads
      - sdb_data:/app/sdb-uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gefahrstoff_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
  sdb_data:
